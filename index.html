<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cover Letter Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <header>
            <h1>AI Cover Letter Generator</h1>
            <p>Enter your details below to generate a tailored cover letter.</p>
        </header>

        <section class="form-section">
            <form id="coverLetterForm">
                <div class="form-group">
                    <label for="name">Full Name <span style="color: red;">*</span></label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="role">Target Role <span style="color: red;">*</span></label>
                    <input type="text" id="role" name="role" required>
                </div>
                <div class="form-group">
                    <label for="company">Target Company <span style="color: red;">*</span></label>
                    <input type="text" id="company" name="company" required>
                </div>
                <div class="form-group">
                    <label for="skills">Key Skills <span style="color: red;">*</span></label>
                    <textarea id="skills" name="skills" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label for="resume">Upload Resume (PDF) <span
                            style="color: gray; font-size: 0.9em;">(Optional)</span></label>
                    <!-- Notice we removed the 'required' keyword at the end of this next line -->
                    <input type="file" id="resume" name="resume" accept="application/pdf">
                </div>

                <button type="submit" class="primary-btn">Generate Cover Letter</button>
            </form>
        </section>

        <section id="resultContainer" class="hidden">
            <h2>Your Generated Cover Letter</h2>
            <div id="letterOutput" class="output-box"></div>
            <button id="copyBtn" class="success-btn">Copy to Clipboard</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
